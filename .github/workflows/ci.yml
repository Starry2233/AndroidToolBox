name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint-and-test:
    name: Lint + Unit Test
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        shell: pwsh
        continue-on-error: true
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pylint

      - name: Run pylint (score must be > 5.5)
        shell: pwsh
        continue-on-error: true
        run: |
          $files = git ls-files | Where-Object {
            ($_ -match '^(src|test)/.*\.py$') -or
            ($_ -eq 'build.py') -or
            ($_ -eq 'check.py')
          }
          if (-not $files) {
            throw "No Python files found for pylint."
          }
          python -m pylint --fail-under=5.5 --disable=import-error $files

      - name: Run unit tests (only test/test_main.py)
        shell: pwsh
        run: |
          python test/test_main.py

  build-on-windows10:
    name: Build Matrix (Windows 10 / windows-2022)
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Ensure submodules are initialized
        shell: pwsh
        run: |
          git submodule sync --recursive
          git submodule update --init --recursive

      - name: Setup pinned WinLibs MinGW for CI and Nuitka cache
        shell: pwsh
        continue-on-error: true
        run: |
          $ErrorActionPreference = "Stop"
          $url = "https://github.com/brechtsanders/winlibs_mingw/releases/download/14.2.0posix-19.1.1-12.0.0-msvcrt-r2/winlibs-x86_64-posix-seh-gcc-14.2.0-llvm-19.1.1-mingw-w64msvcrt-12.0.0-r2.zip"
          $archive = Join-Path $env:RUNNER_TEMP "winlibs-mingw.zip"
          $extractRoot = Join-Path $env:RUNNER_TEMP "winlibs-mingw"
          if (Test-Path $extractRoot) {
            Remove-Item -Recurse -Force $extractRoot
          }
          New-Item -ItemType Directory -Path $extractRoot | Out-Null
          Invoke-WebRequest -Uri $url -OutFile $archive
          Expand-Archive -Path $archive -DestinationPath $extractRoot -Force

          $mingwContainer = Get-ChildItem -Path $extractRoot -Directory | Where-Object {
            Test-Path (Join-Path $_.FullName "mingw64\\bin\\gcc.exe")
          } | Select-Object -First 1
          if (-not $mingwContainer) {
            throw "Cannot locate mingw64/bin/gcc.exe in extracted WinLibs package."
          }
          $mingw64 = Join-Path $mingwContainer.FullName "mingw64"

          $nuitkaGccRoot = Join-Path $env:LOCALAPPDATA "Nuitka\\Nuitka\\Cache\\DOWNLO~1\\gcc\\x86_64\\14.2.0posix-19.1.1-12.0.0-msvcrt-r2"
          $nuitkaMingw = Join-Path $nuitkaGccRoot "mingw64"
          New-Item -ItemType Directory -Path $nuitkaGccRoot -Force | Out-Null
          if (Test-Path $nuitkaMingw) {
            Remove-Item -Recurse -Force $nuitkaMingw
          }

          $linked = $false
          try {
            New-Item -ItemType SymbolicLink -Path $nuitkaMingw -Target $mingw64 -Force | Out-Null
            $linked = $true
            Write-Host "Created symlink: $nuitkaMingw -> $mingw64"
          } catch {
            Write-Host "Symlink creation failed; fallback to copy. Reason: $($_.Exception.Message)"
          }
          if (-not $linked) {
            Copy-Item -Recurse -Force $mingw64 $nuitkaMingw
            Write-Host "Copied WinLibs to: $nuitkaMingw"
          }

          $gccPath = Join-Path $nuitkaMingw "bin\\gcc.exe"
          if (-not (Test-Path $gccPath)) {
            throw "Expected gcc not found: $gccPath"
          }

          "MINGW64_BIN=$nuitkaMingw\\bin" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "$nuitkaMingw\\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          Write-Host "Using MinGW bin: $nuitkaMingw\\bin"

      - name: Ensure Chocolatey
        shell: pwsh
        run: |
          if (Get-Command choco -ErrorAction SilentlyContinue) {
            choco --version
          } else {
            Set-ExecutionPolicy Bypass -Scope Process -Force
            [System.Net.ServicePointManager]::SecurityProtocol = [System.Net.ServicePointManager]::SecurityProtocol -bor 3072
            Invoke-Expression ((New-Object System.Net.WebClient).DownloadString('https://community.chocolatey.org/install.ps1'))
            choco --version
          }

      - name: Preinstall Nuitka Dependency Walker and compiler caches
        shell: pwsh
        continue-on-error: true
        run: |
          $ErrorActionPreference = "Stop"

          # Pre-seed Nuitka Dependency Walker cache to avoid interactive download prompt.
          $dependsCache = Join-Path $env:LOCALAPPDATA "Nuitka\\Nuitka\\Cache\\DOWNLO~1\\depends\\x86_64"
          New-Item -ItemType Directory -Path $dependsCache -Force | Out-Null
          $dependsExe = Join-Path $dependsCache "depends.exe"
          if (-not (Test-Path $dependsExe)) {
            $zipPath = Join-Path $env:RUNNER_TEMP "depends22_x64.zip"
            $extractPath = Join-Path $env:RUNNER_TEMP "depends22_x64"
            if (Test-Path $extractPath) {
              Remove-Item -Recurse -Force $extractPath
            }

            $urls = @(
              "https://dependencywalker.com/depends22_x64.zip",
              "https://www.dependencywalker.com/depends22_x64.zip"
            )
            $downloaded = $false
            foreach ($u in $urls) {
              try {
                Invoke-WebRequest -Uri $u -OutFile $zipPath
                $downloaded = $true
                Write-Host "Downloaded Dependency Walker from: $u"
                break
              } catch {
                Write-Host "Dependency Walker download failed from $u: $($_.Exception.Message)"
              }
            }
            if ($downloaded) {
              Expand-Archive -Path $zipPath -DestinationPath $extractPath -Force
              $found = Get-ChildItem -Path $extractPath -Recurse -Filter "depends.exe" -File | Select-Object -First 1
              if ($found) {
                Copy-Item -Force $found.FullName $dependsExe
                Write-Host "Seeded Dependency Walker: $dependsExe"
              } else {
                Write-Host "Dependency Walker zip extracted but depends.exe not found."
              }
            } else {
              Write-Host "Skipping Dependency Walker pre-seed; Nuitka may auto-download if needed."
            }
          } else {
            Write-Host "Dependency Walker already present: $dependsExe"
          }

          # Install compiler caches early.
          choco install ccache -y --no-progress
          py -3 -m pip install --upgrade pip
          py -3 -m pip install --upgrade clcache

          $pyScripts = py -3 -c "import sysconfig; print(sysconfig.get_path('scripts'))"
          if ($pyScripts) {
            "$pyScripts" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          }
          "CLCACHE_DIR=$env:LOCALAPPDATA\\clcache" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "CLCACHE_SERVER=1" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup MSVC build environment
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Python dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Download binary
        shell: pwsh
        continue-on-error: true
        run: |
          $url = (Get-Content -Path "binary_link.txt" -TotalCount 1).Trim()
          $output = "bin.7z"
          Invoke-WebRequest -Uri $url -OutFile $output

      - name: Build all modes and print build.log every run
        shell: pwsh
        run: |
          $modes = @(
            @{ Name = "pyinstaller+g++"; Args = @("--pyinstaller", "--mingw") },
            @{ Name = "pyinstaller+msvc"; Args = @("--pyinstaller", "--msvc") },
            @{ Name = "nuitka+g++"; Args = @("--nuitka", "mingw", "--mingw") },
            @{ Name = "nuitka+msvc"; Args = @("--nuitka", "msvc", "--msvc") }
          )

          $failed = @()
          foreach ($mode in $modes) {
            Write-Host ""
            Write-Host "========== BUILD MODE: $($mode.Name) =========="

            if (Test-Path build) {
              Remove-Item -Recurse -Force build
            }
            New-Item -ItemType Directory -Path build | Out-Null

            & python build.py -t release --platform win64 --batch --max-threads=3 @($mode.Args)
            $exitCode = $LASTEXITCODE

            Write-Host "--- build/build.log ($($mode.Name)) ---"
            if (Test-Path build/build.log) {
              Get-Content build/build.log
            } else {
              Write-Host "build/build.log not found"
            }
            Write-Host "--- end build/build.log ($($mode.Name)) ---"

            if ($exitCode -eq 0) {
              $required = @(
                "build/main/bin/run_cmd.exe",
                "build/main/bin/main.exe",
                "build/main/bin/repair.exe",
                "build/main/bin/menu.exe"
              )
              $missing = @()
              foreach ($item in $required) {
                if (-not (Test-Path $item)) {
                  $missing += $item
                }
              }
              if ($missing.Count -gt 0) {
                Write-Host "Output verification failed for $($mode.Name). Missing: $($missing -join ', ')"
                $failed += "$($mode.Name) (missing outputs)"
              } else {
                Write-Host "Output verification passed for $($mode.Name)"
              }
            } else {
              Write-Host "Build command failed for $($mode.Name) with exit code $exitCode"
              $failed += "$($mode.Name) (exit=$exitCode)"
            }
          }

          if ($failed.Count -gt 0) {
            Write-Host ""
            Write-Host "FAILED MODES:"
            $failed | ForEach-Object { Write-Host " - $_" }
            throw "One or more build modes failed."
          }

